<!doctype html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEM KEHADIRAN KOT 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            /* GANTIKAN GRADIENT MERAH DENGAN IMEJ BARU */
            background-image: url('https://imgur.com/oARMk93'); 
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat; 
            background-attachment: fixed; /* Menetapkan latar belakang agar tidak tatal bersama kandungan */
            min-height: 100vh; display: flex; align-items: center; justify-content: center; 
            padding: 20px; overflow-x: hidden; position: relative;
        }
        .cubes { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; overflow: hidden; pointer-events: none; }
        .cube { position: absolute; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); animation: animate 25s linear infinite; bottom: -150px; }
        @keyframes animate { 0% { transform: translateY(0) rotate(0deg); opacity: 1; border-radius: 0; } 100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; border-radius: 50%; } }
        
        .canva-card { 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); width: 100%; max-width: 480px; 
            padding: 35px 20px; border-radius: 40px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6); 
            text-align: center; position: relative; z-index: 10;
        }

        .logo-container {
            position: relative; width: 85px; height: 85px; margin: 0 auto 15px auto;
            display: flex; justify-content: center; align-items: center;
        }
        .logo-img { 
            width: 100%; display: block; cursor: pointer; transition: transform 0.3s;
            position: relative; z-index: 2; 
        }
        .logo-container::before {
            content: ''; position: absolute; z-index: 1; width: 100%; height: 100%;
            border-radius: 50%; background: radial-gradient(circle, rgba(220, 38, 38, 0.6) 0%, rgba(220, 38, 38, 0) 70%);
            animation: glowRed 2s infinite ease-in-out;
        }
        @keyframes glowRed {
            0% { transform: scale(0.8); opacity: 0.4; }
            50% { transform: scale(1.4); opacity: 1; }
            100% { transform: scale(0.8); opacity: 0.4; }
        }

        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .status-box { border: 3px solid #f3f4f6; padding: 15px 5px; border-radius: 20px; cursor: pointer; transition: all 0.3s; background: white; }
        .status-box.active-hadir { border-color: #10b981; background: #ecfdf5; transform: translateY(-5px); }
        .status-box.active-tak-hadir { border-color: #f59e0b; background: #fffbeb; transform: translateY(-5px); }
        .select-style { width: 100%; padding: 16px; border: 2px solid #fee2e2; border-radius: 18px; margin-bottom: 20px; font-weight: 600; background-color: white; color: #374151; appearance: none; }
        .btn-detect { background-color: #4b5563; color: white; padding: 15px; border-radius: 15px; width: 100%; font-weight: 600; margin-bottom: 12px; }
        .btn-clockin { background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%); color: white; padding: 18px; border-radius: 18px; width: 100%; font-weight: 700; border: none; }
        .btn-clockin:disabled { background: #d1d5db; opacity: 0.6; }
    </style>
</head>
<body>

<div class="cubes">
    <div class="cube" style="left: 25%; width: 80px; height: 80px; animation-delay: 0s;"></div>
    <div class="cube" style="left: 70%; width: 60px; height: 60px; animation-delay: 4s;"></div>
</div>

<div class="canva-card">
    <div class="logo-container" onclick="handleSecretClick()">
        <img src="https://imgur.com/DLy3jZn.png" class="logo-img">
    </div>

    <h1 class="font-bold text-gray-800 uppercase mb-1" style="font-size: clamp(12px, 4vw, 18px);">
        SISTEM KEHADIRAN KOT 2026
    </h1>
    <p class="text-red-600 font-bold tracking-[0.2em] uppercase" style="font-size: clamp(9px, 2.5vw, 11px); margin-bottom: 5px;">
        SK BANDAR TUN HUSSEIN ONN 2
    </p>
    <p class="text-gray-500 font-semibold uppercase" style="font-size: clamp(8px, 2.2vw, 10px); margin-bottom: 30px; letter-spacing: 0.1em;">
        25 APRIL 2026 | STADIUM BOLA SEPAK CHERAS, KL
    </p>

    <div id="formSection">
        <label class="text-[10px] font-bold text-gray-400 uppercase block mb-2 text-left ml-2">1. Pilih Status Kehadiran</label>
        <div class="status-grid">
            <div id="boxHadir" class="status-box active-hadir" onclick="selectStatus('HADIR')">
                <div class="text-2xl mb-1">✅</div>
                <div class="text-[11px] font-bold text-green-700">HADIR</div>
            </div>
            <div id="boxTakHadir" class="status-box" onclick="selectStatus('TIDAK HADIR')">
                <div class="text-2xl mb-1">❌</div>
                <div class="text-[11px] font-bold text-amber-600">TIDAK HADIR</div>
            </div>
        </div>

        <div class="text-left">
            <label class="text-[10px] font-bold text-gray-400 uppercase block mb-2 ml-2">2. Pilih Nama Guru</label>
            <select id="teacherName" class="select-style">
                <option value="">-- MEMUAT SENARAI... --</option>
            </select>
        </div>

        <button id="detectBtn" class="btn-detect" onclick="detectLocation()">🔍 SAHKAN LOKASI SAYA</button>
        <button id="inBtn" class="btn-clockin" onclick="saveRecord()" disabled>HANTAR KEHADIRAN</button>
    </div>

    <div id="blockSection" class="hidden py-10">
        <div class="text-6xl mb-4">🎉</div>
        <h2 class="text-green-600 font-bold text-xl uppercase">Berjaya!</h2>
        <p class="text-gray-500 text-sm mt-2">Rekod anda telah dihantar untuk hari ini.</p>
    </div>
</div>

<script>
    // URL Web App Google Script anda yang terkini
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzjacEeBgCKsJEphxsLe-Z28KGyKq80r6ESkrHLlc_mIP5yih8oyAIbv8ZgH_VZPkocLg/exec";
    
    let selectedStatus = "HADIR";
    let userLat = ""; let userLng = ""; let clickCount = 0; let clickTimer;

    // Senarai 148 Nama Guru (Disusun A-Z & Tiada Duplikasi)
    const senaraiGuru = [
        "ABDUL KAHAR BIN AWANG SEMAN", "AHMAD SHUHAIMI BIN MD ISA", "AIN NUR BALQIS BINTI YAHYA HARIS", "AIN SYAKILLA BINTI HANIPAH", "AINA ATIRAH BINTI AHMAD SENARI", "ALIFF MUQRI BIN SUHAIMI", "ALSYAMIZAM BIN ABD HALIM", "AMINUDDIN BIN ISMAIL", "AMIRAH BINTI MOHD ALWI", "ANPARSY A/P MUTHUSAMY", "AQILAH IZZATI BINTI AZAM FAIRUZ", "ARINAWATI BINTI MOHD YAH", "ASMAT BINTI MUSTAPHA", "ATHIRAH SYAHIRA BINTI ISHAK", "AWATIF BINTI MD YUSOP", "AZHAIRIN ZULAIHAN BINTI BADRUL HISHAM", "AZIMA BINTI MAT ZIN @ ISMAIL", "AZIZAH BINTI MOHAMMED", "AZLINA BINTI ALIAS", "AZMAN BIN OTHMAN", "BAIRIRAH BINTI RAMLI", "BANU PRIYA A/P SIVAPRAGASAM", "DINITA A/P MUNIANDY", "EMIL NORULHUDA BINTI AMIRUDDIN", "FAIZA BINTI HASBULLAH", "FAIZAH BINTI IBRAHIM", "FARAWAHIDA BINTI MOHD SAFFUAN", "FARHANA BINTI ABDULLAH", "FARIDATUL AKMAAR BINTI MAT SAID", "FATIN FARHANA BINTI AMINUDDIN", "HABSAH BINTI CHE SOM", "HAFIZI BIN OMAR", "HARISAH BINTI AWANG", "HARIZ IRFAN BIN HUSSIN PAKRI", "HARYATI BINTI MAULAN", "HASLINAH BT AHMAD", "HASMAWATI BINTI OTHMAN", "HAZRAH BINTI MOHAMAD", "HEME PRIYA DEVI A/P THIAGARAJAN", "IRDINA AFIQAH BINTI ISMAIL", "IRMA AZNITA BINTI KAMBALI", "IZZATI IIMAN BINTI ISMAIL", "KANG CHIN KOAT", "KASUMMA BINTI PANDAK KAMAL", "KHAIRIAH BINTI HUSIN", "KHAIRUL HAIRAZI BIN MUHAMMAD HELMI", "MARLIZA BT SULONG", "MARYANI BINTI DRAMAN", "MAWADDAH HUDA BINTI MOHD AFFANDI", "MAZILA HAZLIN BINTI ABD MAJIT", "MOHAMAD FIRDAUS BIN ZAINOL", "MOHAMAD MUNIR BIN ZAINUN", "MOHAMED SYAKIR BIN MD TAHIR", "MOHD AIMAN FARID BIN ALIAS", "MOHD NASIR BIN ZAKARIA", "MOHD NOR SOFUAN BIN MAKHTAR", "MOHD REDHUAN BIN HJ ARSHAD", "MOHD SHAMILULHAYAT BIN MOHD ASRI", "MOHD ZAIRUZI BIN MOHD NOR", "MUHAMMAD AKASYAH SAIDON", "MUHAMMAD FARIS BIN MANSOR", "MUHAMMAD FIRDAUS BIN MOHD ASNAN", "MUHAMMAD HADIF BIN MD FAUZI", "MUHAMMAD HARIZ BIN HASSAN", "MUHAMMAD HAZIQ FITRI BIN NORAZMI", "MUHAMMAD IKHWAN BIN WAN AZELEE", "MUHAMMAD IRFAN WAZIF BIN MOHD NIZAM", "NADIAH BINTI IDRIS", "NAGINIDEVI A/P RATHAKRUSHNAN", "NAIM AISAMUDDIN BIN ABDUL RAZAK", "NAZIMATUL AMANI BINTI RAMLI", "NIK HAZIMAN BIN CHE DAUD", "NIK NUR LIYANA BINTI NIK MOHD FAUZI", "NITHILA A/P JAKANATHAN", "NOOR AZIZAH BINTI MD BAHARUDDIN", "NOR AMIN BIN MAT NOR", "NOR IDAWATI BINTI ABU HASAN", "NOR ZAHIRAH BINTI ZAKARIA", "NOR' ATIKAH BINTI ABDUL LATIF", "NOR'AIN BINTI OTHMAN", "NORAIDA BINTI MUSTAPHA", "NORAMANI BINTI MAT NOR", "NORMA BINTI ISMAIL", "NORAZIANTY BT ABDOL LATIF", "NORUL HUDA BINTI JAMIN", "NOUR EZIEZAH BINTI MAZMAN", "NUR AQIILAH BINTI AZMAN", "NUR FARAH WAHIDA BINTI MAT ANI", "NUR FARHANI BINTI ZAKARIA", "NUR FATHIN BINTI ZAKI", "NUR INTAN NAZIFAH BINTI SHAMSURI", "NUR KHADIJAH BINTI ZAHARIMAN", "NUR SABRINA FARISHA BINTI MOHAMMAD FAIZ", "NUR SYAFIQAH BINTI ZAHIRUDIN", "NUR SYUHADA BINTI ABDUL WAHAB", "NUR ZURIYATIE BINTI AZIZ", "NURAZIAH BT TASLEM", "NURIZYAN BINTI ZAINUDDIN", "NURUL ATIKAH BINTI BUKHARI", "NURUL FARIHA BINTI MAULAD JAAFAR", "NURUL HALIZA ILYANA BINTI MOHD RAZALI", "NURUL HAZIQAH BINTI RAMLI", "NURUL HAZWANI BINTI ABDUL WAHAB", "NURUL KHAIRUNIE BINTI MAHTAR", "NURUL LIYANA BINTI NOR AZMI", "NURUL ULYA BINTI NORDIN", "PIRAKAS A/L SHANGAR", "ROHAIZA BINTI RAZALI", "ROSHIDA AINA BINTI AMIRRUDDIN", "ROSNIZA BINTI MOHD YUSOFF", "ROZIAH BT AZIZI", "RUHAIZA BINTI JUPRI", "SAPIAH BINTI DAUD", "SAHARINA BINTI ABDULLAH", "SAIZA NINEY NABIHA BINTI SAIFUL BAHARI", "SHARIFAH NUR WAHIDA BINTI SYED YAZIZ", "SITI AMINAH BT AWANG MAT", "SITI HAJAR BINTI AB RAHIM", "SITI HAWA BINTI MAT YAJID", "SITI MASHITAH BINTI MOHD ASRI", "SITI NAHARIAH BINTI ALI", "SITI NAZIRAH BINTI MAT RAHIM", "SITI NAZRIAH BINTI SANIN", "SITI NORASYIKIN BINTI ABDULLAH", "SITI NUR DIANA BINTI MOHAMAD NASIR", "SITI ZALEHA BINTI YUSOFF", "SITI ZURIATUL FIRZANAH BINTI JAMAL", "SOFIAN A/L SANGUAN", "STEPHANIE NYSSA GOMEZ", "SULAIMAN BIN HASAN", "SUMAYYAH BINTI JOHAIDI", "SUNITA BINTI RODZI", "SURIANY BINTI IBRAHIM", "SUZILA BINTI MOHD NOR", "SYARFIZA BINTI ABDUL WAHAB SHAARANI", "TG IHTIFAZUDDIN BIN TG IBRAHIM", "TUAN NUR AFIFAH BINTI TUAN OMAR", "UMI NUR HANIRA BINTI ISMAIL", "UMMU HANISAH BINTI ZAINUDIN", "WAN FAIRIS BIN A. KAMAR", "WAN NUR ATIQAH BINTI WAN ZAKARIA", "ZABIDI BIN MOHAMMAD", "ZAITON BINTI MOHAMAD", "ZAKIRI BIN AB HAMID", "ZANIRAH BINTI A. BAKAR", "ZIZIE ZAWANAH BINTI ZULKIFLI", "ZUHAIRI BIN HJ IBRAHIM", "ZURAINI BINTI ABDULLAH"
    ];

    window.onload = async function() {
        const select = document.getElementById('teacherName');
        const today = new Date().toLocaleDateString();

        try {
            const statusResp = await fetch(`${WEB_APP_URL}?action=getStatus`);
            const systemStatus = await statusResp.text();
            
            if (systemStatus === "closed") {
                document.getElementById('formSection').innerHTML = `<div class="py-10 text-center"><div class="text-6xl mb-4">🔒</div><h2 class="text-red-600 font-bold text-xl uppercase">Sistem Ditutup</h2><p class="text-gray-500 text-sm mt-2">Maaf, sesi kehadiran telah ditutup oleh admin.</p></div>`;
                return;
            }

            if(localStorage.getItem('last_submit_date') === today) {
                document.getElementById('formSection').classList.add('hidden');
                document.getElementById('blockSection').classList.remove('hidden');
                return;
            }

            const resp = await fetch(WEB_APP_URL);
            const namesDone = await resp.json();
            
            select.innerHTML = '<option value="">-- SILA PILIH NAMA --</option>';
            senaraiGuru.forEach(nama => {
                let opt = document.createElement('option');
                opt.value = nama; 
                opt.innerHTML = namesDone.includes(nama) ? "✅ " + nama : nama;
                select.appendChild(opt);
            });
        } catch(e) {
            console.log("Error Loading:", e);
            select.innerHTML = '<option value="">-- SILA PILIH NAMA --</option>';
            senaraiGuru.forEach(nama => {
                let opt = document.createElement('option');
                opt.value = nama; opt.innerHTML = nama; select.appendChild(opt);
            });
        }
    }

    function selectStatus(val) {
        selectedStatus = val;
        document.getElementById('boxHadir').className = 'status-box' + (val === 'HADIR' ? ' active-hadir' : '');
        document.getElementById('boxTakHadir').className = 'status-box' + (val === 'TIDAK HADIR' ? ' active-tak-hadir' : '');
        document.getElementById('inBtn').disabled = true;
    }

    function detectLocation() {
        // Koordinat Stadium Bola Sepak Cheras, KL
        const stadiumLat = 3.100535; 
        const stadiumLog = 101.721450;
        
        document.getElementById('detectBtn').innerText = "SEDANG MENGESAN...";

        navigator.geolocation.getCurrentPosition((pos) => {
            userLat = pos.coords.latitude; 
            userLng = pos.coords.longitude;
            
            const R = 6371e3; // Meter
            const d1 = stadiumLat * Math.PI/180; 
            const d2 = userLat * Math.PI/180;
            const df = (userLat - stadiumLat) * Math.PI/180; 
            const dl = (userLng - stadiumLog) * Math.PI/180;
            
            const a = Math.sin(df/2) * Math.sin(df/2) + 
                      Math.cos(d1) * Math.cos(d2) * Math.sin(dl/2) * Math.sin(dl/2);
            const dist = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

            document.getElementById('detectBtn').innerText = "🔍 SAHKAN LOKASI SAYA";

            if (selectedStatus === "HADIR") {
                // Radius 1000 meter (1km)
                if (dist <= 1000) { 
                    document.getElementById('inBtn').disabled = false; 
                    alert("LOKASI DISAHKAN!\nJarak anda ke pusat stadium: " + Math.round(dist) + " meter."); 
                }
                else { 
                    alert("ANDA DI LUAR KAWASAN STADIUM!\nJarak anda: " + Math.round(dist/1000) + "km dari stadium. Sila pastikan anda berada di kawasan Stadium Cheras."); 
                }
            } else {
                document.getElementById('inBtn').disabled = false; 
                alert("LOKASI DIREKODKAN (Status: Tidak Hadir).");
            }
        }, (err) => {
            alert("Ralat GPS: Sila aktifkan GPS telefon anda.");
            document.getElementById('detectBtn').innerText = "🔍 SAHKAN LOKASI SAYA";
        }, { enableHighAccuracy: true });
    }

    function saveRecord() {
        const nama = document.getElementById('teacherName').value;
        if (!nama) return alert("Sila pilih nama!");
        
        document.getElementById('inBtn').innerText = "MENGHANTAR...";
        document.getElementById('inBtn').disabled = true;

        fetch(WEB_APP_URL, {
            method: "POST",
            body: JSON.stringify({ 
                nama: nama, 
                status: selectedStatus, 
                lat: userLat, 
                lng: userLng, 
                deviceId: "WEB-SKBTHO2" 
            })
        }).then(() => {
            localStorage.setItem('last_submit_date', new Date().toLocaleDateString());
            alert("KEHADIRAN BERJAYA!");
            location.reload();
        }).catch(() => {
            localStorage.setItem('last_submit_date', new Date().toLocaleDateString());
            alert("REKOD TELAH DIHANTAR!");
            location.reload();
        });
    }

    function handleSecretClick() {
        clickCount++; clearTimeout(clickTimer);
        if (clickCount === 3) { adminControl(); clickCount = 0; }
        else { clickTimer = setTimeout(() => { clickCount = 0; }, 500); }
    }

    function adminControl() {
        const pass = prompt("MOD ADMIN:");
        if(pass === "KOKU4055") {
            alert("Sila tunggu, menukar status sistem...");
            fetch(`${WEB_APP_URL}?action=toggle`)
            .then(res => res.text())
            .then(result => { alert(result); location.reload(); });
        }
    }
</script>
</body>
</html>
